<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Links — Festa Dona Maria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --cream: #f7f1e3;
            --gold: #c9a876;
            --gold-deep: #a8865a;
            --ink: #2a2017;
            --ink-soft: #6b5a4a;
            --line: rgba(168, 134, 90, 0.2);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .wrap {
            max-width: 720px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: 0.02em;
        }
        header p {
            color: var(--ink-soft);
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 6px 24px -10px rgba(42, 32, 23, 0.15);
            border: 1px solid var(--line);
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink);
            margin-bottom: 0.4rem;
        }
        .base-url {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: monospace;
            background: #fdfaf4;
        }
        textarea {
            width: 100%;
            min-height: 140px;
            padding: 0.8rem;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
            background: #fdfaf4;
        }
        .row { display: flex; gap: 0.5rem; }
        .row textarea { flex: 1; }
        button {
            padding: 0.7rem 1.2rem;
            background: var(--ink);
            color: var(--cream);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 0.06em;
            transition: background 0.2s;
        }
        button:hover { background: var(--gold-deep); }
        button.gold {
            background: var(--gold-deep);
        }
        button.gold:hover { background: var(--ink); }
        .links-list {
            max-height: 420px;
            overflow-y: auto;
            margin-top: 0.6rem;
        }
        .link-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 0.6rem;
            border-bottom: 1px solid var(--line);
        }
        .link-item:last-child { border-bottom: none; }
        .link-nome {
            min-width: 120px;
            font-weight: 600;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--ink);
        }
        .link-url {
            flex: 1;
            font-family: monospace;
            font-size: 0.72rem;
            color: var(--ink-soft);
            word-break: break-all;
            background: #fdfaf4;
            padding: 0.35rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--line);
        }
        .copy-btn {
            padding: 0.35rem 0.7rem;
            font-size: 0.72rem;
            white-space: nowrap;
        }
        .del-btn {
            padding: 0.35rem 0.5rem;
            font-size: 0.8rem;
            background: none;
            color: #c0392b;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .del-btn:hover {
            opacity: 1;
            background: #fce8e6;
        }
        .empty {
            color: var(--ink-soft);
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
        }
        .counter {
            font-size: 0.85rem;
            color: var(--ink-soft);
            margin-bottom: 0.5rem;
            text-align: right;
        }
        .hint {
            font-size: 0.78rem;
            color: var(--ink-soft);
            margin-top: 0.5rem;
            line-height: 1.5;
        }
        .copied-toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ink);
            color: var(--cream);
            padding: 0.7rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .copied-toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>Gerador de Links</h1>
            <p>Festa Dona Maria — 60 Anos</p>
        </header>

        <div class="card">
            <label>URL base do convite</label>
            <input type="text" id="baseUrl" class="base-url"
                   value="https://aniversario60anos.vercel.app/" />
            <p class="hint">Mude aqui se o site estiver em outro domínio</p>
        </div>

        <div class="card">
            <label>Adicionar nomes (um por linha)</label>
            <div class="row">
                <textarea id="namesInput" placeholder="Maria Silva&#10;João Santos&#10;Fabrycio Bermudes"></textarea>
                <button onclick="adicionar()" style="align-self: flex-start;">Adicionar</button>
            </div>
            <p class="hint">Digite ou cole nomes novos. Se um nome já existir na lista, ele é ignorado.</p>
        </div>

        <div class="card">
            <div class="counter" id="counter">0 convidados</div>
            <div class="row" style="margin-bottom: 0.8rem;">
                <button onclick="copiarTodos()" class="gold">📋 Copiar todos</button>
                <button onclick="limpar()" style="background: #888;">🗑️ Limpar tudo</button>
            </div>
            <div class="links-list" id="linksList">
                <div class="empty">Nenhum convidado ainda. Adicione nomes acima.</div>
            </div>
        </div>
    </div>

    <div class="copied-toast" id="toast">Copiado!</div>

    <footer style="text-align:center;padding:1.5rem;color:var(--ink-soft);font-size:0.8rem;">
        <a href="/confirmados.html" style="color:var(--gold-deep);text-decoration:none;">📋 Confirmados</a>
        ·
        <a href="/gerar.html" style="color:var(--gold-deep);text-decoration:none;">🔗 Gerar Links</a>
    </footer>

    <script>
        const baseUrlInput = document.getElementById('baseUrl');
        const namesInput = document.getElementById('namesInput');
        const linksList = document.getElementById('linksList');
        const counter = document.getElementById('counter');
        const toast = document.getElementById('toast');
        let convidados = [];

        const SB_URL = 'https://qhkcilqktcdevkkysovp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoa2NpbHFrdGNkZXZra3lzb3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NTk5NzksImV4cCI6MjEwMDMzNTk3OX0.gGg83qvinqHsZkdRacGYVRheCwawWeUKAHCiEpni9LU';

        function sbH() { return {
            'Content-Type': 'application/json',
            'apikey': SB_KEY,
            'Authorization': 'Bearer ' + SB_KEY
        };}

        function toastShow(m) {
            toast.textContent = m;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function buildLink(n) {
            const base = baseUrlInput.value.trim().replace(/\/?$/, '/');
            return base + '?nome=' + encodeURIComponent(n.trim());
        }

        // ---- CARREGAR ----
        async function carregar() {
            try {
                const r = await fetch(SB_URL + '/rest/v1/links_gerados?select=*&order=nome.asc', {
                    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
                });
                if (!r.ok) return;
                convidados = await r.json();
                render();
            } catch (e) {}
        }

        // ---- RENDER ----
        function render() {
            if (convidados.length === 0) {
                linksList.innerHTML = '<div class="empty">Nenhum convidado ainda. Adicione nomes acima.</div>';
                counter.textContent = '0 convidados';
                return;
            }
            counter.textContent = `${convidados.length} convidado${convidados.length > 1 ? 's' : ''}`;
            linksList.innerHTML = convidados.map((c, i) => `
                <div class="link-item">
                    <span class="link-nome">${c.nome}</span>
                    <span class="link-url">${c.link}</span>
                    <button class="copy-btn" onclick="copiar(${c.id})">Copiar</button>
                    <button class="del-btn" onclick="deletar(${c.id})">✕</button>
                </div>
            `).join('');
        }

        // ---- ADICIONAR ----
        async function adicionar() {
            const nomes = namesInput.value.split('\n').map(n => n.trim()).filter(n => n);
            if (nomes.length === 0) { toastShow('Digite pelo menos um nome'); return; }

            // Verifica duplicatas
            const existentes = new Set(convidados.map(c => c.nome.toLowerCase().trim()));
            const novos = [];
            const ignorados = [];

            for (const n of nomes) {
                if (existentes.has(n.toLowerCase())) {
                    ignorados.push(n);
                } else {
                    novos.push(n);
                    existentes.add(n.toLowerCase());
                }
            }

            if (ignorados.length > 0) {
                toastShow(`${ignorados.length} já existente${ignorados.length > 1 ? 's' : ''}: ${ignorados.join(', ')}`);
            }

            if (novos.length === 0) return;

            for (const nome of novos) {
                await fetch(SB_URL + '/rest/v1/links_gerados', {
                    method: 'POST',
                    headers: sbH(),
                    body: JSON.stringify({ nome: nome, link: buildLink(nome) })
                }).catch(() => {});
            }

            namesInput.value = '';
            await carregar();
            toastShow(`${novos.length} adicionado${novos.length > 1 ? 's' : ''}!`);
        }

        // ---- COPIAR ----
        async function copiar(id) {
            const c = convidados.find(x => x.id === id);
            if (!c) return;
            try {
                await navigator.clipboard.writeText(c.link);
                toastShow('Link copiado!');
            } catch (e) {
                toastShow('Erro ao copiar');
            }
        }

        async function copiarTodos() {
            if (convidados.length === 0) { toastShow('Nenhum convidado'); return; }
            try {
                await navigator.clipboard.writeText(convidados.map(c => c.link).join('\n'));
                toastShow('Todos copiados!');
            } catch (e) {
                toastShow('Erro ao copiar');
            }
        }

        // ---- DELETAR ----
        async function deletar(id) {
            await fetch(SB_URL + '/rest/v1/links_gerados?id=eq.' + id, {
                method: 'DELETE',
                headers: sbH()
            }).catch(() => {});
            await carregar();
            toastShow('Removido');
        }

        // ---- LIMPAR ----
        async function limpar() {
            const ok = confirm('Limpar todos os convidados?');
            if (!ok) return;
            await fetch(SB_URL + '/rest/v1/links_gerados?id=neq.0', {
                method: 'DELETE',
                headers: sbH()
            }).catch(() => {});
            await carregar();
            toastShow('Tudo limpo');
        }

        // ---- EVENTOS ----
        namesInput.addEventListener('paste', () => setTimeout(adicionar, 100));
        carregar();
    </script>
</body>
</html>
