<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmados — Festa Dona Maria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --cream: #f7f1e3;
            --gold: #c9a876;
            --gold-deep: #a8865a;
            --ink: #2a2017;
            --ink-soft: #6b5a4a;
            --line: rgba(168, 134, 90, 0.2);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.6;
        }
        .wrap { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--line);
        }
        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 2.2rem;
            margin-bottom: 0.4rem;
        }
        header p { color: var(--ink-soft); font-size: 0.9rem; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .stat {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 4px 14px -8px rgba(42, 32, 23, 0.1);
        }
        .stat-num {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.8rem;
            color: var(--gold-deep);
            line-height: 1;
        }
        .stat-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
            margin-top: 0.3rem;
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 999px;
            font-size: 0.82rem;
            font-family: inherit;
            color: var(--ink);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--gold-deep); }
        .filter-btn.active {
            background: var(--ink);
            color: var(--cream);
            border-color: var(--ink);
        }

        .lista { display: flex; flex-direction: column; gap: 0.8rem; }

        .card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 1.2rem 1.4rem;
            box-shadow: 0 4px 14px -10px rgba(42, 32, 23, 0.1);
            transition: transform 0.15s;
        }
        .card:hover { transform: translateY(-1px); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.6rem;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .nome {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.4rem;
            color: var(--ink);
            line-height: 1.2;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .badge-sim {
            background: #d4ead2;
            color: #2d5e2f;
        }
        .badge-nao {
            background: #f5d8d4;
            color: #8a2c1f;
        }
        .detalhes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--ink-soft);
        }
        .detalhe-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            background: var(--cream);
            border-radius: 6px;
            font-size: 0.82rem;
        }
        .acompanhantes {
            margin-top: 0.6rem;
            padding: 0.7rem 0.9rem;
            background: #fdfaf4;
            border-left: 3px solid var(--gold);
            border-radius: 6px;
            font-size: 0.88rem;
        }
        .mensagem {
            margin-top: 0.5rem;
            font-style: italic;
            color: var(--ink-soft);
            font-size: 0.9rem;
            padding: 0.6rem 0.9rem;
            background: #fdfaf4;
            border-radius: 6px;
        }
        .data {
            font-size: 0.72rem;
            color: var(--ink-soft);
            margin-top: 0.6rem;
            opacity: 0.7;
        }

        .empty, .loading, .error {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--ink-soft);
            font-size: 0.95rem;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--line);
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #b33a2a; }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--line);
            color: var(--ink-soft);
            font-size: 0.8rem;
        }
        footer a {
            color: var(--gold-deep);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .nome { font-size: 1.2rem; }
            header h1 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>Confirmações</h1>
            <p>Festa Dona Maria — 60 Anos</p>
        </header>

        <!-- ESTATÍSTICAS -->
        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="stat-total">—</div>
                <div class="stat-label">Total respostas</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-sim">—</div>
                <div class="stat-label">Confirmados</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-nao">—</div>
                <div class="stat-label">Não vão</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-pessoas">—</div>
                <div class="stat-label">Pessoas total*</div>
            </div>
        </div>
        <p style="text-align: center; font-size: 0.75rem; color: var(--ink-soft); margin: -1rem 0 1.2rem; opacity: 0.7;">
            *inclui acompanhantes
        </p>

        <!-- FILTROS -->
        <div class="filters">
            <button class="filter-btn active" data-filter="todos">Todos</button>
            <button class="filter-btn" data-filter="Sim">Confirmados</button>
            <button class="filter-btn" data-filter="Não">Não vão</button>
        </div>

        <!-- LISTA -->
        <div id="lista" class="lista">
            <div class="loading"><span class="spinner"></span> Carregando confirmações...</div>
        </div>

        <footer>
            <a href="/">← Voltar ao convite</a> · Atualiza automaticamente
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://qhkcilqktcdevkkysovp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoa2NpbHFrdGNkZXZra3lzb3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NTk5NzksImV4cCI6MjEwMDMzNTk3OX0.gGg83qvinqHsZkdRacGYVRheCwawWeUKAHCiEpni9LU';

        const listaEl = document.getElementById('lista');
        let allData = [];
        let currentFilter = 'todos';

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleDateString('pt-BR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function renderStats(data) {
            const sim = data.filter(d => d.presenca === 'Sim').length;
            const nao = data.filter(d => d.presenca === 'Não').length;
            const pessoas = data
                .filter(d => d.presenca === 'Sim')
                .reduce((acc, d) => acc + 1 + (parseInt(d.qtd_dependentes) || 0), 0);
            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-sim').textContent = sim;
            document.getElementById('stat-nao').textContent = nao;
            document.getElementById('stat-pessoas').textContent = pessoas;
        }

        function renderList() {
            const filtered = currentFilter === 'todos'
                ? allData
                : allData.filter(d => d.presenca === currentFilter);

            if (filtered.length === 0) {
                listaEl.innerHTML = '<div class="empty">Nenhuma confirmação ainda. Aguardando respostas...</div>';
                return;
            }

            listaEl.innerHTML = filtered.map(d => {
                const badgeClass = d.presenca === 'Sim' ? 'badge-sim' : 'badge-nao';
                const badgeIcon = d.presenca === 'Sim' ? '✓' : '✕';
                const badgeText = d.presenca === 'Sim' ? 'Confirmou' : 'Não vai';

                const qtdDep = parseInt(d.qtd_dependentes) || 0;
                const temAcompanhantes = d.acompanhantes && d.acompanhantes.trim().length > 0;

                return `
                    <div class="card">
                        <div class="card-header">
                            <div class="nome">${escapeHtml(d.nome)}</div>
                            <span class="badge ${badgeClass}">${badgeIcon} ${badgeText}</span>
                        </div>
                        ${d.presenca === 'Sim' ? `
                            <div class="detalhes">
                                <span class="detalhe-item">👥 ${qtdDep} ${qtdDep === 1 ? 'acompanhante' : 'acompanhantes'}</span>
                                ${qtdDep > 0 ? `<span class="detalhe-item">📅 ${qtdDep + 1} pessoas no total</span>` : ''}
                            </div>
                            ${temAcompanhantes ? `
                                <div class="acompanhantes">
                                    <strong>Acompanhantes:</strong> ${escapeHtml(d.acompanhantes)}
                                </div>
                            ` : ''}
                        ` : ''}
                        ${d.mensagem && d.mensagem.trim() ? `
                            <div class="mensagem">"${escapeHtml(d.mensagem)}"</div>
                        ` : ''}
                        <div class="data">Confirmado em ${formatDate(d.created_at)}</div>
                    </div>
                `;
            }).join('');
        }

        async function carregar() {
            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/confirmacoes?select=*&order=created_at.desc`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
                        }
                    }
                );

                if (!res.ok) throw new Error('HTTP ' + res.status);

                allData = await res.json();
                renderStats(allData);
                renderList();

            } catch (err) {
                console.error('Erro:', err);
                listaEl.innerHTML = `<div class="error">Erro ao carregar: ${err.message}</div>`;
            }
        }

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderList();
            });
        });

        // Atualiza a cada 30s
        carregar();
        setInterval(carregar, 30000);
    </script>
</body>
</html>
